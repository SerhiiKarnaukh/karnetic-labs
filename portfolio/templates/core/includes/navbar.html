<!-- Spinner Start -->
<div id="spinner"
     class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner"></div>
</div>
<!-- Spinner End -->
{% include "core/includes/topbar.html" %}
<!-- Navbar Start -->
<div class="container-fluid position-relative p-0">
    <div class="container-fluid bg-primary bg-header">
        <div class="row py-5">
            <div class="col-12 text-center">
                <a href="{% url 'core:index' %}">
                    <h1 class="display-4 text-white">Karnaukh-WebDev</h1>
                </a>
                {% if core_title and request.path != '/' %}
                    {% if 'category' in request.path %}
                        <h4 class="display-6 text-white">{{ core_title }}</h4>
                    {% elif 'tag' in request.path %}
                        <h3 class="text-white">
                            <span class="brand-color me-2">Tag:</span>{{ core_title }}
                        </h3>
                    {% endif %}
                {% else %}
                    <p class="header-subtitle text-white-50 mb-0">Full Stack Software Engineering</p>
                {% endif %}
            </div>
        </div>
    </div>
</div>
<!-- Navbar End -->
